<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4D6256" />
      <stop offset="100%" stop-color="#1C2421" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Background Card with rounded corners -->
  <rect width="512" height="512" rx="140" fill="url(#bg)" />
  
  <!-- Subtle Inner Border -->
  <rect x="24" y="24" width="464" height="464" rx="116" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="8" />
  
  <!-- The "55" Digit -->
  <text x="50%" y="54%" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" 
        font-weight="900" 
        font-size="280" 
        fill="#FFFFFF" 
        filter="url(#glow)"
        dominant-baseline="middle" 
        text-anchor="middle" 
        letter-spacing="-14">55</text>
</svg>
